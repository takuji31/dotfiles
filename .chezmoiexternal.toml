[".tmux/plugins/tpm"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tpm.git"
    refreshPeriod = "168h"
    [".tmux/plugins/tpm".clone]
        args = ["--depth", "1"]
    [".tmux/plugins/tpm".pull]
        args = ["--ff-only"]

[".tmux/plugins/tmux-powerkit"]
    type = "git-repo"
    url = "https://github.com/fabioluciano/tmux-powerkit.git"
    refreshPeriod = "168h"
    [".tmux/plugins/tmux-powerkit".clone]
        args = ["--depth", "1"]
    [".tmux/plugins/tmux-powerkit".pull]
        args = ["--ff-only"]

# private repos contains private info
[".config/cmux"]
    type = "git-repo"
    url = "git@github.com:takuji31/cmux-config.git"
    refreshPeriod = "168h"
